# perf.toml — config for run_apps_conf.py. Top-level [env] is shared;
# each app is its own [<app>] table identified by a `desktop` key, optionally
# with local_state(+_flags) for Chromium Local State or argv_json(+argv) for
# Electron. (run_gpu_conf.py installs the egpu-prime boot service and reads no
# config here — its inputs are static assets in files/.)

[brave]
desktop     = "/usr/share/applications/brave-browser.desktop"
local_state = ".config/BraveSoftware/Brave-Browser/Local State"

# brave://flags via Local State (id@option-index; @1 = Enabled).
local_state_flags = [
    # "enable-unsafe-webgpu@1",
]

# render-node-override is silently overridden by Chromium on Optimus.
# disable-features kills Vulkan trials that error on Wayland Ozone.
switches = [
    "disable-features=Vulkan,DefaultANGLEVulkan,VulkanFromANGLE",
]

# Joined into one --enable-features=A,B,C per group. Comment a group to disable.
# VaapiOnNvidiaGPUs is required on this box: Chromium disables VA-API whenever
# an NVIDIA GPU is detected in PCI, regardless of which driver/renderer is
# actually in use.
[brave.features]
video_decode = ["VaapiOnNvidiaGPUs", "AcceleratedVideoDecodeLinuxGL", "AcceleratedVideoDecodeLinuxZeroCopyGL"]
video_encode = ["AcceleratedVideoEncoder"]
pipewire     = ["WebRTCPipeWireCapturer"]
wayland_sync = ["WaylandLinuxDrmSyncobj"]

[code_insiders]
desktop   = "/usr/share/applications/code-insiders.desktop"
argv_json = ".vscode-insiders/argv.json"

# render-node-override here hangs the GPU process at startup — Electron does
# not silently override it the way Brave's Chromium does on Optimus.
switches = []

# Keys go through VS Code's hardcoded allowlist; anything outside it is dropped.
[code_insiders.argv]
"ozone-platform-hint"     = "auto"
"enable-gpu-rasterization" = true
"ignore-gpu-blocklist"    = true
"enable-features"         = "VaapiOnNvidiaGPUs,AcceleratedVideoDecodeLinuxGL,AcceleratedVideoDecodeLinuxZeroCopyGL,WaylandLinuxDrmSyncobj"
