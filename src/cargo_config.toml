# cargo.toml — Rust packages installed via cargo-binstall by run_cargo.py.
# Each entry is the crate name as published on crates.io; `cargo install --list`
# reports the same name (cargo-binstall writes to cargo's own .crates.toml
# registry, so binstall'd and source-built packages share one index).
#
# Re-run src/run_cargo.py after editing. Missing entries are NOT uninstalled.

packages = [
    "cargo-update",
    "just",
    "just-lsp",
    "rumdl",
]
